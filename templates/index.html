<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hostel Food Feedback</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  <div class="page">

    <form class="feedback-form" method="POST" action="/submit">

      <h3>🍽 Hostel Food Feedback</h3>

      <!-- ✅ SUCCESS MESSAGE -->
      {% if submitted %}
        <div class="success-msg">
          ✅ Thank you {{ name }}, your feedback was submitted successfully!
        </div>
      {% endif %}

      <label>Name</label>
      <input type="text" name="name" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Day</label>
      <select name="day">
        <option>Monday</option>
        <option>Tuesday</option>
        <option>Wednesday</option>
        <option>Thursday</option>
        <option>Friday</option>
        <option>Saturday</option>
        <option>Sunday</option>
      </select>

      <label>Food Item</label>
      <input type="text" name="food" required>

      <label>Feedback</label>
      <select name="feedback">
        <option>Like</option>
        <option>Dislike</option>
        <option>Poor</option>
        <option>Average</option>
      </select>

      <label>Comments</label>
      <textarea name="comments" rows="3"></textarea>

      <button type="submit">Submit Feedback</button>

    </form>

  </div>

</body>
</html>
